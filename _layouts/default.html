<!DOCTYPE html>
<html lang="en">
<!-- Template: https://github.com/luost26/academic-homepage -->
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{{ page.title }} - {{ site.data.profile.navbar_name }}</title>
    <meta name="google-site-verification" content="FAmaE24iEhOTH88YphB5rZIwcKehYmLZSZ1KYJhBOEQ" />
    <meta name="msvalidate.01" content="F8843F410D80DCF4C88AB9385543D597" />

    <script>
        (function() {
            var storedTheme = localStorage.getItem('theme');
            var now = new Date();
            var hour = now.getHours();
            var isDaytime = hour >= 8 && hour < 20;
            var theme = storedTheme || (isDaytime ? 'light' : 'dark');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.0/css/bootstrap.min.css" integrity="sha512-P5MgMn1jBN01asBgU0z60Qk4QxiXo86+wlFahKrsQf37c9cro517WzVSPPV1tDKzhku2iJ2FVgL67wG03SGnNA==" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/academicons/1.9.1/css/academicons.min.css" integrity="sha512-b1ASx0WHgVFL5ZQhTgiPWX+68KjS38Jk87jg7pe+qC7q9YkEtFq0z7xCglv7qGIs/68d3mAp+StfC8WKC5SSAg==" crossorigin="anonymous" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Libre+Caslon+Text:wght@400;700&family=Libre+Franklin:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ '/assets/css/global.css' | relative_url }}">
    <link rel="icon" href="assets/images/badges/intj.png" />
</head>
<body
    class="bg-light"
    data-show-publication-tags="{{ site.data.profile.show_publication_tags | default: true }}"
    data-ambient-bg="{{ site.data.profile.ambient_bg.enabled | default: true }}"
    data-ambient-bg-density="{{ site.data.profile.ambient_bg.density | default: 110 }}"
    data-ambient-bg-glow-light="{{ site.data.profile.ambient_bg.glow_strength_light | default: 0.08 }}"
    data-ambient-bg-glow-dark="{{ site.data.profile.ambient_bg.glow_strength_dark | default: 0.12 }}"
    data-ambient-bg-glow-radius-scale="{{ site.data.profile.ambient_bg.glow_radius_scale | default: 1.05 }}"
    data-ambient-bg-line-distance="{{ site.data.profile.ambient_bg.line_distance | default: 110 }}"
    data-ambient-bg-line-distance-mobile="{{ site.data.profile.ambient_bg.line_distance_mobile | default: 36 }}"
    data-ambient-bg-line-alpha-light="{{ site.data.profile.ambient_bg.line_alpha_light | default: 0.12 }}"
    data-ambient-bg-line-alpha-dark="{{ site.data.profile.ambient_bg.line_alpha_dark | default: 0.15 }}"
    data-ambient-bg-particle-speed="{{ site.data.profile.ambient_bg.particle_speed | default: 0.12 }}"
    data-ambient-bg-particle-speed-jitter="{{ site.data.profile.ambient_bg.particle_speed_jitter | default: 0.3 }}"
    data-ambient-bg-particle-drift="{{ site.data.profile.ambient_bg.particle_drift | default: 0.18 }}"
    data-ambient-bg-particle-alpha-base="{{ site.data.profile.ambient_bg.particle_alpha_base | default: 0.85 }}"
    data-ambient-bg-particle-alpha-boost="{{ site.data.profile.ambient_bg.particle_alpha_boost | default: 0.4 }}"
    data-ambient-bg-particle-repulse-radius="{{ site.data.profile.ambient_bg.particle_repulse_radius | default: 140 }}"
    data-ambient-bg-particle-repulse-strength="{{ site.data.profile.ambient_bg.particle_repulse_strength | default: 0.6 }}"
    data-ambient-bg-scroll-drift-x="{{ site.data.profile.ambient_bg.scroll_drift_x | default: 0.015 }}"
    data-ambient-bg-scroll-drift-y="{{ site.data.profile.ambient_bg.scroll_drift_y | default: 0.04 }}"
    data-ambient-bg-wobble="{{ site.data.profile.ambient_bg.wobble | default: 6 }}"
    {{ page.body_attr }}
>
    {% include navbar.html %}
    <canvas id="ambient-bg" aria-hidden="true"></canvas>
    <div class="container">
        {{content}}
    </div>
    {% include footer.html %}

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="//cdnjs.cloudflare.com/ajax/libs/jquery.lazy/1.7.9/jquery.lazy.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.0/js/bootstrap.min.js" integrity="sha512-XKa9Hemdy1Ui3KSGgJdgMyYlUg1gM+QhL6cnlyTe2qzMCYm4nAZ1PsVerQzTTXzonUR+dmswHqgJPuwCq1MaAg==" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/github-buttons/2.14.2/buttons.min.js" integrity="sha512-OYwZx04hKFeFNYrWxIyo3atgGpb+cxU0ENWBZs72X7T9U+NoHPM1ftUn/Mfw7dRDXrqWA6M1wBg6z6fGE32aeA==" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk" crossorigin="anonymous"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            renderMathInElement(document.body, {
              delimiters: [
                  {left: '$$', right: '$$', display: true},
                  {left: '$', right: '$', display: false}
              ],
              throwOnError : false
            });
        });
    </script>
    <script src="{{ '/assets/js/ambient_bg.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/common.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/bubble_visual_hash.js' | relative_url }}"></script>
</body>
</html>
