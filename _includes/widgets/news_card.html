{% assign news_by_year = site.news
  | sort: "date"
  | reverse
  | slice: 0, include.limit
  | group_by_exp: "item", "item.date | date: '%Y'"
-%}

<div class="my-3 bg-white shadow-sm rounded-sm news-card">
  <style>
    .news-card .news-body {
      padding: 0 1rem 1rem 1rem;
    }
    .news-card .news-wrap {
      max-height: 280px;
      overflow-y: auto;
      padding: 0.75rem 0.25rem 0.5rem 0.25rem;
    }
    .news-card .news-section {
      padding: 0.35rem 0.25rem 0.5rem 0.25rem;
    }
    .news-card .news-year {
      font-weight: 600;
      margin-bottom: 0.35rem;
    }
    .news-card .news-item {
      display: flex;
      gap: 0.75rem;
      padding: 0.5rem 0.25rem 0.6rem 0.25rem;
      background: transparent;
      border-radius: 0;
    }
    .news-card .news-date {
      white-space: nowrap;
      color: #6c757d;
      font-weight: 600;
    }
    .news-card .news-title {
      color: inherit;
    }
    .news-card .news-divider {
      border-top: 1px solid var(--border);
      margin: 0.4rem 0 0.6rem 0;
    }
    @media (max-width: 767.98px) {
      .news-card .news-item {
        padding: 0.5rem 0.5rem 0.6rem 0.6rem;
      }
    }
  </style>
  <h6 class="p-3 mb-0 border-bottom border-gray">
    <i class="fas fa-rss"></i> News
  </h6>
  <div class="news-body text-profile-bio">
    <div class="news-wrap">
      {% for year in news_by_year %}
        <div class="news-section" id="news-year-{{ year.name }}">
          <div class="news-year">{{ year.name }}</div>
          <div class="news-divider"></div>
          {% for item in year.items %}
            <div class="news-item">
              <div class="news-date">{{ item.date | date: "%Y-%m-%d" }}</div>
              <div class="news-title">{{ item.title }}</div>
            </div>
          {% endfor %}
        </div>
      {% endfor %}
    </div>
  </div>
</div>
